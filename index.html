
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Nextwave Homepage</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden;
        }

        /* Hintergrundvideo */
        .video-bg {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            object-fit: cover;
        }

        /* Overlay */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
        }

        /* Logo */
        .logo {
            position: absolute;
            top: 20px;
            left: 30px; /* oben links */
            font-size: 28px;
            font-weight: bold;
            z-index: 2;
        }

        .logo a {
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .logo a:hover {
            color: white; /* Hoverding-Farbe */
        }

        /* zentriert */
        .content {
            position: relative;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        .content h1 {
            color: white;
            font-size: 60px;
            margin-bottom: 40px;
        }

        .buttons {
            display: flex;
            gap: 30px;
        }

        .buttons a {
            text-decoration: none;
            padding: 15px 35px;
            font-size: 18px;
            border-radius: 40px;
            background: white;
            color: black;
            transition: 0.3s;
            font-weight: bold;
        }
        
        .buttons b {
            text-decoration: none;
            padding: 12px 27px;
            font-size: 15px;
            border-radius: 32px;
            background: white;
            color: black;
            transition: 0.3s;
            font-weight: bold;
        }
        
        .buttons a:hover {
            background: #00bcd4;
            color: white;
        }
        .buttons b:hover {
            background: #00bcd4;
            color: white;
        }
        
        @media (max-width: 768px) {
            .content h1 {
                font-size: 36px;
            }

            .buttons {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <!-- Hintergrundvideo -->
    <video autoplay muted loop playsinline class="video-bg">
        <source src="Hintergrundsurfvideo.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <!-- Clickbares Logo oben links -->
    <div class="logo">
        <a href="index.html">Nextwave</a>
    </div>

    <!-- Knöpfe und so -->
    <div class="content">
        <h1>FOR YOUR NEXT WAVE</h1>
        <div class="buttons">
            <a href="shop.html">Online Shop</a>
            <a href="about.html">About Us</a>
            <a href="contact.html">Contact</a>
            <a href="contact.html">Forms</a>
        </div>
    </div>

</body>
</html>
