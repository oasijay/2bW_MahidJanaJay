<!DOCTYPE html>
<html>
<body>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact - Nextwave</title>
  
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}


body{
background:linear-gradient(to bottom,#e0f7fa,#ffffff);
min-height:100vh;
}

  
form{
display:flex;
flex-direction:column;
gap:15px;
}


label{
font-weight:bold;
}

  
  
h2{
text-align:center;
margin-bottom:30px;
}

.logo{
position:fixed;
top:20px;
left:30px;
font-size:28px;
font-weight:bold;
}

.logo a{
text-decoration:none;
color:black;
}

.logo a:hover{
color:#00bcd4;
}

.container{
max-width:600px;
margin:140px auto;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
}


input{
padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
}


button{
margin-top:10px;
padding:12px;
border:none;
border-radius:30px;
background:#00bcd4;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0097a7;
}

</style>
</head>
  
<body>


<div class="logo">
<a href="index.html">Nextwave</a>
</div>

<div class="container">  
<form>

<label for="fname">First name</label>
<input type="text" id="fname" name="fname" placeholder="Your first name">
<label for="lname">Last name</label>
<input type="text" id="lname" name="lname" placeholder="Your last name">
<button type="submit">Send</button>

</form>
</div>

</body>
</html>
